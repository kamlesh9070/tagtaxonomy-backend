spring:
  datasource:
    url: jdbc:h2:mem:tagtaxonomy;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;SCHEMA=PUBLIC
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: PUBLIC
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: PUBLIC
    parameters:
      DB_SCHEMA: PUBLIC
  logging:
    level:
      org.springframework.boot.autoconfigure.liquibase: DEBUG
      liquibase: DEBUG
  test:
    database:
      replace: NONE

DB_SCHEMA: PUBLIC
